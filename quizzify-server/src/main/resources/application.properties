spring.application.name=quizzify-server

#Database configuration
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=quizzify;encrypt=false;trustServerCertificate=true;
spring.datasource.username=sa
spring.datasource.password=sa1
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

server.servlet.context-path=/Quizzify

spring.application.version=1.0.0