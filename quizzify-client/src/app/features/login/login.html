<div class="login-wrapper">
  <div class="login-left">
    <mat-card class="cardWithShadow boxed-auth">
      <mat-card-content class="p-32">
        <div class="text-center">
          <img
            src="assets/images/dark-logo.png"
            class="align-middle"
            alt="quizzify_logo"
            width="200px"
          />
        </div>
        <div class="or-border mt-2">Login</div>
        <form class="m-t-8" [formGroup]="loginForm" (ngSubmit)="onSubmit()">
          <mat-label class="f-s-14 m-b-12 d-block">
            Email<span class="text-danger">*</span>
          </mat-label>
          <mat-form-field appearance="outline" class="w-100" color="primary">
            <input matInput formControlName="email" placeholder="Email*" />
          </mat-form-field>
          <mat-label class="f-s-14 m-b-12 d-block">
            Password<span class="text-danger">*</span>
          </mat-label>
          <mat-form-field appearance="outline" class="w-100" color="primary">
            <input
              matInput
              [type]="hide ? 'password' : 'text'"
              formControlName="password"
              placeholder="Password*"
            />
            <button
              type="button"
              mat-icon-button
              matSuffix
              (click)="hide = !hide"
              [attr.aria-label]="'Hide password'"
              [attr.aria-pressed]="hide"
            >
              <mat-icon>{{ hide ? 'visibility_off' : 'visibility' }}</mat-icon>
            </button>
          </mat-form-field>
          <button
            mat-flat-button
            color="primary"
            [disabled]="loginForm.invalid"
            class="w-100 f-s-16 my-2"
          >
            Login
          </button>
          <span class="f-s-14 d-block text-center mt-2">
            Don't have an account?
            <a routerLink="/signup" class="text-primary no-account">Sign Up</a>
          </span>
        </form>
      </mat-card-content>
    </mat-card>
  </div>
  <div class="login-right">
    <app-grid />
    <div class="right-content">
      <img src="assets/images/light-logo.png" width="280" alt="logo" class="mb-4" />
      <p class="right-text">
        Quizzify is an online quiz platform that allows users to create, and take quizzes on a wide
        range of topics.
      </p>
    </div>
  </div>
</div>
